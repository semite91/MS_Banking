version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking
    ports:
      - "5432:5432"

  auth:
    build: ../auth
    ports:
      - "5001:80"
    depends_on:
      - rabbitmq
      - redis
      - postgres

  customer:
    build: ../customer
    ports:
      - "5002:80"
    depends_on:
      - postgres

# Add other services similarly (account, transaction, payment, fraud, loan, gateway)
